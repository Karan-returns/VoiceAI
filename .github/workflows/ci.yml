name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  agent:
    name: LiveKit Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-livekit-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: my-livekit-agent/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  dashboard:
    name: QA Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
      - run: npm run build
