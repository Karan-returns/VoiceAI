# Render.com — deploy from dashboard/ directory or set root directory to dashboard in UI.
# https://dashboard.render.com → New → Blueprint

services:
  - type: web
    name: novatel-qa-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: DASHBOARD_API_KEY
        generateValue: true
